<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>갑양의 복직 전 로드맵 v6 - 시각화</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --accent: #0f172a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--text);
      padding: 24px;
    }
    .wrap { max-width: 1040px; margin: 0 auto; }
    .hero {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(226,232,240,0.8);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(15,23,42,0.06);
      margin-bottom: 20px;
    }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    .sub { color: var(--muted); margin-bottom: 16px; }
    .callout {
      background: #fff7ed;
      border: 1px solid #fdba74;
      color: #9a3412;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .tabs { display: flex; gap: 10px; margin: 20px 0; }
    .tab {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      background: white;
      color: var(--muted);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
    }
    .tab.active { background: var(--accent); color: white; }
    .panel.hidden { display: none; }
    .stack { display: grid; gap: 14px; }
    .phase {
      background: var(--card);
      border: 1px solid var(--line);
      border-left-width: 6px;
      border-radius: 20px;
      box-shadow: 0 14px 30px rgba(15,23,42,0.05);
      overflow: hidden;
    }
    .phase-head {
      padding: 20px;
      cursor: pointer;
    }
    .phase-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .phase-id { display: flex; gap: 12px; align-items: center; }
    .icon { font-size: 2rem; }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      color: white;
      font-size: 0.75rem;
      font-weight: 800;
      margin-right: 8px;
    }
    .period { color: var(--muted); font-size: 0.9rem; }
    .title { font-size: 1.1rem; font-weight: 800; margin-top: 4px; }
    .rev {
      background: #ecfdf5;
      color: #047857;
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .meta { font-size: 0.95rem; margin: 6px 0; }
    .meta span { color: var(--muted); font-weight: 700; margin-right: 6px; }
    .phase-body {
      border-top: 1px solid var(--line);
      padding: 18px 20px 20px;
      display: none;
      background: #fcfdff;
    }
    .phase.open .phase-body { display: block; }
    .items { display: grid; gap: 8px; }
    .item { display: flex; gap: 8px; align-items: center; font-size: 0.95rem; }
    .pill {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 999px;
    }
    .note {
      margin-top: 14px;
      background: #f8fafc;
      border-radius: 14px;
      padding: 12px 14px;
      color: #475569;
      font-size: 0.88rem;
    }
    .revenue-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 36px rgba(15,23,42,0.05);
    }
    .revenue-row { margin-bottom: 14px; }
    .revenue-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.93rem;
      margin-bottom: 6px;
    }
    .track { height: 28px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .bar {
      height: 100%;
      background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      font-size: 0.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
    }
    .foot { margin-top: 16px; color: var(--muted); font-size: 0.92rem; }
    @media (max-width: 720px) {
      body { padding: 14px; }
      .phase-top { flex-direction: column; }
      .rev { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>🎯 갑양의 복직 전 로드맵 v6 <small style="font-size:0.5em;color:#64748b;">시각화</small></h1>
      <div class="sub">2026년 6월부터 2027년 2월 이후까지, 베이비 트래커 1개에 집중하고 11월부터 복직 준비로 전환하는 일정</div>
      <div class="callout">💡 <strong>시각화 파일:</strong> 이 HTML은 보기 전용입니다. 프로젝트 추가나 일정 변경은 <strong>2026_ProjectTimeline.md</strong>에서 먼저 수정하세요.</div>
    </section>

    <div class="tabs">
      <button class="tab active" data-tab="timeline">📅 타임라인</button>
      <button class="tab" data-tab="revenue">💰 수익 추이</button>
    </div>

    <section id="timeline" class="panel">
      <div id="phase-list" class="stack"></div>
    </section>

    <section id="revenue" class="panel hidden">
      <div class="revenue-card">
        <h2>💰 월별 수익 추이 (단위: 만원)</h2>
        <div id="revenue-list"></div>
        <div class="foot">복직 후 1차 목표는 본업 적응을 해치지 않는 범위에서 베이비 트래커 수익을 월 20~30만원으로 유지하는 것이다.</div>
      </div>
    </section>
  </div>

  <script>
    const phases = [
      {
        id: 1,
        period: '2026년 6월',
        label: '체력 회복 + 준비',
        tag: 'NOW',
        color: '#10b981',
        icon: '💪',
        focus: '산후 회복 + Flutter 환경 세팅',
        daily: '존2 유산소 + 회복 근력 + 자세 교정',
        items: [
          { label: '존2 걷기 30→60분 (4주간 점진적 증가)', type: 'health' },
          { label: '산후 코어: 글루트브릿지·버드독·플랭크', type: 'health' },
          { label: '자세 교정: 친 턱 + 월 엔젤', type: 'health' },
          { label: 'Flutter 개발 환경 세팅 + Claude Code 셋업', type: 'prep' },
          { label: '베이비 트래커 HTML 프로토 → Flutter 설계', type: 'prep' },
          { label: 'Hive / Riverpod 기본 학습', type: 'study' },
        ],
        note: '회복이 메인이다. 개발은 환경 세팅과 기초 학습까지만 하고, 통증이 있으면 병원 체크를 우선한다.',
      },
      {
        id: 2,
        period: '2026년 7월',
        label: '베이비 트래커 코어',
        tag: 'Phase 1',
        color: '#6366f1',
        icon: '👶',
        focus: '기본 입력 + 로컬 저장',
        daily: '밤 2시간 실개발 / 낮잠 Flutter 강의',
        items: [
          { label: '수유·기저귀·수면·헬멧 버튼 입력 + Hive 저장', type: 'dev' },
          { label: 'Riverpod 상태관리와 진행 중 토글', type: 'dev' },
          { label: '분유 버튼 길게 누름 → 종류 선택', type: 'dev' },
          { label: '헬멧 슬라이딩 24h 로직', type: 'dev' },
          { label: 'UI는 HTML 프로토 그대로 사용', type: 'rule' },
        ],
        note: '본인이 매일 쓰는 앱이라 자연스럽게 디버깅된다. 디자인 씨름은 금지.',
      },
      {
        id: 3,
        period: '2026년 8월',
        label: '차트 + 알림',
        tag: 'Phase 2',
        color: '#6366f1',
        icon: '📊',
        focus: '시각화 + 푸시 알림',
        daily: '밤 2~3시간',
        items: [
          { label: '24h 가로 스크롤 미니차트', type: 'dev' },
          { label: '일간 상세 모달 + 세로 타임라인', type: 'dev' },
          { label: '주간/월간 통계 모달', type: 'dev' },
          { label: 'flutter_local_notifications 적용', type: 'dev' },
          { label: '카테고리 필터 + 메모 입력', type: 'dev' },
        ],
        note: '알림이 핵심 차별화 포인트다. 차트는 외부 라이브러리 의존을 최소화한다.',
      },
      {
        id: 4,
        period: '2026년 9월',
        label: '테스트 + Play Store 출시',
        tag: 'Phase 3',
        color: '#f59e0b',
        icon: '🚀',
        focus: 'MVP 출시',
        daily: '밤 2~3시간',
        revenue: '출시 — 초기 수익 0~5만원',
        items: [
          { label: '1주일 실사용 테스트', type: 'dev' },
          { label: '버그 수정 + 엣지케이스 처리', type: 'dev' },
          { label: '개인정보 처리방침 작성', type: 'launch' },
          { label: 'Google Play Console 등록', type: 'launch' },
          { label: '스토어 스크린샷 + 설명 작성', type: 'launch' },
          { label: 'Play Store 제출 → 리뷰 통과', type: 'launch' },
        ],
        note: '완벽함보다 출시가 목표다.',
      },
      {
        id: 5,
        period: '2026년 10월',
        label: 'v1.1 안정화 + 위젯',
        tag: 'Phase 4',
        color: '#6366f1',
        icon: '🔧',
        focus: '피드백 반영 + Android 홈 위젯',
        daily: '밤 2시간',
        revenue: '베이비 5~10만원',
        items: [
          { label: '버그 수정 + UX 개선', type: 'dev' },
          { label: 'Android 홈 위젯 (home_widget)', type: 'dev' },
          { label: 'kkanddabia 첫 포스팅 — 출시 후기', type: 'sns' },
          { label: '복직 준비 사전 동향 체크 시작', type: 'prep' },
        ],
        note: '복직 3개월 전부터 페이스를 낮춘다.',
      },
      {
        id: 6,
        period: '2026년 11월',
        label: '복직 준비 시작 + 앱 유지',
        tag: '복직 D-3',
        color: '#ec4899',
        icon: '📚',
        focus: 'TA 실무 감각 회복',
        daily: 'TA 학습 위주 / 앱은 주말 유지보수만',
        revenue: '베이비 10~15만원',
        items: [
          { label: '3ds Max / Maya 최신 버전 체크', type: 'study' },
          { label: 'MaxScript / Python 감각 복원', type: 'study' },
          { label: 'Unreal 5 최신 기능 학습', type: 'study' },
          { label: '베이비 트래커는 주 1회 버그 픽스만', type: 'dev' },
          { label: '육아 일상 콘텐츠 주 1회', type: 'sns' },
        ],
        note: '복직 후 적응 속도를 높이려면 지금 미리 감을 잡아야 한다.',
      },
      {
        id: 7,
        period: '2026년 12월',
        label: 'TA 실무 + 포트폴리오 정리',
        tag: '복직 D-2',
        color: '#ec4899',
        icon: '🎨',
        focus: '리깅/애니메이션 감각 복원',
        daily: 'TA 실습 위주',
        revenue: '베이비 15~20만원',
        items: [
          { label: 'Blender 리깅 워크플로우 복습', type: 'study' },
          { label: '캐릭터 리깅 샘플 1개 완성', type: 'dev' },
          { label: 'Unreal 캐릭터 셋업 실습', type: 'study' },
          { label: '최근 작업 기준 포트폴리오 업데이트', type: 'prep' },
          { label: '앱은 자동화된 운영 유지', type: 'dev' },
        ],
        note: '장기간 휴직 후 복직이라 실무 감각 회복이 최우선이다.',
      },
      {
        id: 8,
        period: '2027년 1월',
        label: '복직 직전 최종 정비',
        tag: '복직 D-1',
        color: '#ec4899',
        icon: '🎯',
        focus: '최종 준비 + 컨디션 조절',
        daily: 'TA 마무리 + 체력 관리 / 앱 최소 유지',
        revenue: '베이비 20만원 도달',
        items: [
          { label: '회사 프로젝트 동향 파악', type: 'prep' },
          { label: 'TA 워크플로우 정리 노트 작성', type: 'study' },
          { label: '수면 패턴 조정', type: 'health' },
          { label: '가족 일정 정비', type: 'prep' },
          { label: '앱 1.2 마이너 업데이트', type: 'dev' },
        ],
        note: '체력과 멘탈 회복이 우선이다. 무리하지 않는다.',
      },
      {
        id: 9,
        period: '2027년 2월~',
        label: '복직 + 앱 유지 + 외주 탐색',
        tag: '복직',
        color: '#10b981',
        icon: '🚀',
        focus: '회사 적응 + 사이드 수익 안정화',
        daily: '회사 풀타임 / 앱은 주말 2~4시간만',
        revenue: '베이비 20~30만원 + 본업',
        items: [
          { label: '베이비 트래커 분기별 업데이트', type: 'dev' },
          { label: '뽀모도로 RPG 다시 검토', type: 'dev' },
          { label: '버튜버 외주 시장 조사', type: 'study' },
          { label: '워킹맘 개발자 콘텐츠 운영', type: 'sns' },
        ],
        note: '복직 적응이 최우선이다. 앱은 유지보수 모드로 간다.',
      },
    ];

    const revenueData = [
      { month: '~8월', app: 0, label: '베이비 개발 중' },
      { month: '9월', app: 3, label: '베이비 출시' },
      { month: '10월', app: 8, label: 'v1.1 안정화' },
      { month: '11월', app: 12, label: '복직 준비 시작' },
      { month: '12월', app: 17, label: 'TA 실무 복원' },
      { month: '1월', app: 20, label: '복직 D-1' },
      { month: '2월~', app: 25, label: '복직 + 유지' },
    ];

    const typeColors = {
      dev: ['#ede9fe', '#7c3aed'],
      study: ['#dbeafe', '#1d4ed8'],
      rule: ['#fef3c7', '#b45309'],
      health: ['#d1fae5', '#065f46'],
      prep: ['#f1f5f9', '#475569'],
      launch: ['#fce7f3', '#be185d'],
      sns: ['#e0f2fe', '#0369a1'],
    };
    const typeLabels = {
      dev: '개발', study: '공부', rule: '원칙', health: '체력', prep: '준비', launch: '출시', sns: 'SNS'
    };
    const maxRevenue = 30;

    const phaseList = document.getElementById('phase-list');
    phases.forEach((phase, index) => {
      const card = document.createElement('article');
      card.className = 'phase' + (index === 1 ? ' open' : '');
      card.style.borderLeftColor = phase.color;
      const items = phase.items.map((item) => {
        const [bg, text] = typeColors[item.type];
        return '<div class="item"><span class="pill" style="background:' + bg + ';color:' + text + '">' + typeLabels[item.type] + '</span><span>' + item.label + '</span></div>';
      }).join('');
      card.innerHTML = '<div class="phase-head">'
        + '<div class="phase-top">'
        + '<div class="phase-id">'
        + '<div class="icon">' + phase.icon + '</div>'
        + '<div><div><span class="tag" style="background:' + phase.color + '">' + phase.tag + '</span><span class="period">' + phase.period + '</span></div><div class="title">' + phase.label + '</div></div>'
        + '</div>'
        + (phase.revenue ? '<div class="rev">' + phase.revenue + '</div>' : '')
        + '</div>'
        + '<div class="meta"><span>목표</span>' + phase.focus + '</div>'
        + '<div class="meta"><span>일과</span>' + phase.daily + '</div>'
        + '</div>'
        + '<div class="phase-body"><div class="items">' + items + '</div><div class="note">💡 ' + phase.note + '</div></div>';
      card.querySelector('.phase-head').addEventListener('click', () => card.classList.toggle('open'));
      phaseList.appendChild(card);
    });

    const revenueList = document.getElementById('revenue-list');
    revenueData.forEach((row) => {
      const item = document.createElement('div');
      item.className = 'revenue-row';
      item.innerHTML = '<div class="revenue-top"><strong>' + row.month + '</strong><span>' + row.label + '</span></div>'
        + '<div class="track"><div class="bar" style="width:' + ((row.app / maxRevenue) * 100) + '%">' + (row.app > 0 ? row.app : '') + '</div></div>';
      revenueList.appendChild(item);
    });

    const tabs = document.querySelectorAll('.tab');
    tabs.forEach((btn) => {
      btn.addEventListener('click', () => {
        tabs.forEach((b) => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach((p) => p.classList.add('hidden'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.remove('hidden');
      });
    });
  </script>
</body>
</html>
